services:
  # PostgreSQL 16
  db:
    image: postgres:16-alpine
    container_name: pms-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7 (세션/캐시)
  redis:
    image: redis:7-alpine
    container_name: pms-redis
    restart: always
    environment:
      TZ: Asia/Seoul
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend (Node.js + Express + Prisma)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    container_name: pms-server
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3100
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      TZ: Asia/Seoul
    volumes:
      - uploads:/app/uploads
      - ./license.json:/app/license.json:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Frontend (Vue 3 + Vuetify + Nginx)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    container_name: pms-client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata:
  redisdata:
  uploads:
